<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#ebe9e3;
      overflow-x:hidden;
    }

    h1,h2{
      font-family:'Cormorant Garamond', serif;
      font-weight:700;
      color:#000;
    }

    p,a{
      font-family:'Inter', sans-serif;
    }

    /* NAVBAR */

    nav{
      padding:30px 40px;
    }

    .logo{
      font-size:2rem;
      display:flex;
      align-items:center;
      gap:10px;
    }

    /* HERO SECTION */

    .hero{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 40px 80px;
      min-height:60vh;
    }

    .hero h1{
      font-size:9rem;
      line-height:0.9;
    }

    .hero img{
      width:340px;
      object-fit:contain;
    }

    /* ABOUT SECTION */

    .about{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      padding:60px 40px 80px;
      gap:40px;
    }

    .about-left{
      width:40%;
    }

    .about-left h2{
      font-size:5rem;
      line-height:0.9;
      margin-bottom:30px;
    }

    .buttons{
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    .buttons a{
      text-decoration:none;
      background:#000;
      color:#fff;
      width:220px;
      padding:14px 20px;
      border-radius:8px;
      text-align:center;
      font-weight:600;
      transition:0.3s ease;
    }

    .buttons a:hover{
      background:#222;
    }

    .about-right{
      width:60%;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:30px;
    }

    .about-right p{
      max-width:420px;
      font-size:1rem;
      line-height:1.7;
      font-weight:600;
      color:#000;
    }

    .about-right img{
      width:280px;
      object-fit:contain;
    }

    /* MOBILE */

    @media(max-width:900px){

      .hero{
        flex-direction:column;
        text-align:center;
        gap:40px;
      }

      .hero h1{
        font-size:5rem;
      }

      .about{
        flex-direction:column;
      }

      .about-left,
      .about-right{
        width:100%;
      }

      .buttons a{
        width:100%;
      }

      .about-left h2{
        font-size:4rem;
      }

    }

  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">
      ◆ Remy Pinto
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">

    <h1>Portfolio</h1>

    <!-- Replace with your image -->
    <img src="ProfilePicture.jpg" alt="picture of Filbert">

  </section>

  <!-- ABOUT -->
  <section class="about">

    <div class="about-left">

      <h2>
        About<br>
        Filbert
      </h2>

      <div class="buttons">

        <!-- Button Links -->
        <a href="contact.html">Get in contact</a>

        <a href="pastwork.html">Past Work</a>

        <a href="achievements.html">Achievements</a>

      </div>

    </div>

    <div class="about-right">

      <p>
        Filbert is currently a student at Murdoch University,
        where he is studying the Cyber Security and Forensics
        course.
      </p>

      <!-- Replace with your image -->
      <img src="ProfilePicture.jpg" alt="picture of Filbert">

    </div>

  </section>

</body>
</html>
